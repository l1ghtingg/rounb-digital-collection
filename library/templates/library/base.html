
{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Коллекции автографов РОУНБ{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="icon" href="{% static 'images/logo.ico'%}" type="image/x-icon">
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">

    <a class="navbar-brand" href="#">
              <img src="{% static 'images/logo.png' %}" alt="РОУНБ" width="30" height="24">
            </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Переключатель навигации">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'library:homepage' %}">Главная</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Контакты</a>
        </li>
        </li>
      </ul>
    <form class="d-flex" method="GET" action="{% url 'library:search' %}">
    <input 
        class="form-control me-2" 
        type="search" 
        name="q" 
        placeholder="Поиск по элементам" 
        aria-label="Поиск">
    <button class="btn btn-outline-success" type="submit">Поиск</button>
    </form>
    </div>
  </div>
</nav>
  <style>
    .card-img-top { object-fit: cover; height: 200px; }
    .author-photo { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; }
  </style>
</head>
<body>

<div class="container my-4">
  {% block content %}{% endblock %}
</div>

<footer class="bg-light py-4 mt-5">
      <div class="container text-center">
        <a class="navbar-brand" href="https://rounb.ru/">
              <img src="{% static 'images/logo.png' %}" alt="РОУНБ" width="30" height="24">
       <p class="mb-0">
    <span class="d-block d-md-inline">РОУНБ им. Горького © 2026</span>
</p>
      </div>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
